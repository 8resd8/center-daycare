version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    command: --default-time-zone='+09:00'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - arisa-network
    restart: always

  backend:
    image: arisa-backend:latest
    container_name: arisa-backend-prod
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    depends_on:
      - mysql
    networks:
      - arisa-network

  frontend:
    image: arisa-frontend:latest
    container_name: arisa-frontend-prod
    ports:
      - "127.0.0.1:3000:80"
    restart: always
    depends_on:
      - backend
    networks:
      - arisa-network

networks:
  arisa-network:
    driver: bridge

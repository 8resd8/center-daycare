name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t arisa-backend:latest -f backend/Dockerfile .

      - name: Build frontend image
        run: |
          docker build -t arisa-frontend:latest ./frontend

      - name: Save Docker images
        run: |
          docker save arisa-backend:latest | gzip > arisa-backend.tar.gz
          docker save arisa-frontend:latest | gzip > arisa-frontend.tar.gz

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "arisa-backend.tar.gz,arisa-frontend.tar.gz,docker-compose.prod.yml"
          target: "/home/${{ secrets.EC2_USERNAME }}/arisa"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/arisa

            # .env 생성
            echo "${{ secrets.ENV_FILE }}" > .env

            # Docker 이미지 로드
            docker load < arisa-backend.tar.gz
            docker load < arisa-frontend.tar.gz

            # 기존 컨테이너 중지
            docker compose -f docker-compose.prod.yml down || true

            # 새 컨테이너 시작
            docker compose -f docker-compose.prod.yml up -d

            # 파일 정리
            rm -f arisa-backend.tar.gz arisa-frontend.tar.gz

            # 미사용 이미지 정리
            docker image prune -f

            echo "Deployment completed successfully!"
